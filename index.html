<!DOCTYPE html>

<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Träningsplaneraren</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
  :root {
    --accent: #f5c842; --text: #f0ede4;
    --panel: #0f1a12; --panel2: #172019;
    --border: rgba(255,255,255,0.11); --green-dark: #162a1c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Barlow', sans-serif; background: var(--panel); color: var(--text); display: flex; flex-direction: column; }
  header { background: var(--green-dark); border-bottom: 2px solid var(--accent); padding: 7px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .header-actions { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border: none; border-radius: 3px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:hover { background: #ffd84a; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .app-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  .toolbox { width: 176px; background: var(--panel2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .toolbox-section { padding: 9px 10px; border-bottom: 1px solid var(--border); }
  .toolbox-title { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 7px; }
  .pitch-selector { display: flex; flex-direction: column; gap: 3px; }
  .pitch-option { padding: 6px 9px; border-radius: 3px; border: 1px solid var(--border); cursor: pointer; font-size: 11px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; transition: all 0.15s; background: transparent; color: var(--text); text-align: left; }
  .pitch-option:hover { border-color: var(--accent); }
  .pitch-option.active { background: var(--accent); color: #111; border-color: var(--accent); }
  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
  .tool-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 3px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; background: transparent; color: var(--text); font-size: 9px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.15s; }
  .tool-btn:hover { border-color: var(--accent); background: rgba(245,200,66,0.08); }
  .tool-btn.active { border-color: var(--accent); background: rgba(245,200,66,0.15); color: var(--accent); }
  .tool-btn svg { width: 22px; height: 22px; }
  .player-count { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .player-count label { font-size: 11px; color: rgba(255,255,255,0.45); flex: 1; }
  .player-count input { width: 44px; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 3px; font-size: 12px; text-align: center; }
  .color-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .color-swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .color-swatch.active { border-color: white; transform: scale(1.2); }
  .canvas-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a1209; overflow: hidden; position: relative; }
  #pitch-canvas { display: block; touch-action: none; }
  .hint-bar { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); padding: 3px 14px; border-radius: 20px; font-size: 11px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; color: rgba(255,255,255,0.45); pointer-events: none; white-space: nowrap; }
  .legend { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.65); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 10px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; color: rgba(255,255,255,0.55); }
  .steps-panel { width: 235px; background: var(--panel2); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .steps-header { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .steps-header h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; flex: 1; }
  .steps-list { flex: 1; overflow-y: auto; padding: 7px; display: flex; flex-direction: column; gap: 5px; }
  .step-empty { text-align: center; color: rgba(255,255,255,0.18); font-size: 11px; padding: 20px 0; }
  .step-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 7px 9px; cursor: pointer; transition: all 0.15s; position: relative; }
  .step-card:hover { border-color: rgba(255,255,255,0.22); }
  .step-card.active { border-color: var(--accent); background: rgba(245,200,66,0.07); }
  .step-num { display: inline-block; width: 18px; height: 18px; background: var(--accent); color: #111; border-radius: 50%; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 11px; text-align: center; line-height: 18px; margin-right: 5px; flex-shrink: 0; }
  .step-card-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 12px; display: flex; align-items: center; margin-bottom: 3px; }
  .step-card-comment { font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.4; margin-left: 23px; }
  .step-delete { position: absolute; top: 5px; right: 6px; background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 13px; line-height: 1; padding: 0; }
  .step-delete:hover { color: #e74c3c; }
  .add-step-area { padding: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
  .add-step-area input, .add-step-area textarea { background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 3px; padding: 5px 7px; font-size: 11px; font-family: 'Barlow', sans-serif; resize: none; width: 100%; }
  .add-step-area input:focus, .add-step-area textarea:focus { outline: none; border-color: var(--accent); }
  .add-step-area textarea { height: 48px; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
</style>
</head>
<body>
<header>
  <h1>&#9917; Träningsplaneraren</h1>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="undoLast()">&#x21A9; Ångra</button>
    <button class="btn btn-ghost" onclick="clearCanvas()">Rensa</button>
    <button class="btn btn-ghost" onclick="exportPNG()">&#8595; PNG</button>
    <button class="btn btn-primary" onclick="exportPDF()">&#8595; PDF</button>
  </div>
</header>
<div class="app-body">
  <div class="toolbox">
    <div class="toolbox-section">
      <div class="toolbox-title">Plantyp</div>
      <div class="pitch-selector">
        <button class="pitch-option active" onclick="setPitch('full')" data-pitch="full">Hel plan</button>
        <button class="pitch-option" onclick="setPitch('half')" data-pitch="half">Halvplan</button>
        <button class="pitch-option" onclick="setPitch('third')" data-pitch="third">En tredjedel</button>
        <button class="pitch-option" onclick="setPitch('box')" data-pitch="box">Straffområde</button>
        <button class="pitch-option" onclick="setPitch('free')" data-pitch="free">Fri yta</button>
      </div>
    </div>
    <div class="toolbox-section">
      <div class="toolbox-title">Verktyg</div>
      <div class="tool-grid">
        <button class="tool-btn active" id="tool-player" onclick="setTool('player')">
          <svg viewBox="0 0 24 24"><path d="M8 3 Q7 3 6 4 L4 7 Q3 8 4 9 L6 9 L6 18 Q6 19 7 19 L9 19 L9 14 L15 14 L15 19 L17 19 Q18 19 18 18 L18 9 L20 9 Q21 8 20 7 L18 4 Q17 3 16 3 Z" fill="currentColor"/></svg>
          Spelare
        </button>
        <button class="tool-btn" id="tool-cone" onclick="setTool('cone')">
          <svg viewBox="0 0 24 24"><polygon points="12,3 20,20 4,20" fill="#ff6b1a"/><rect x="3" y="19" width="18" height="2" rx="1" fill="#cc4400"/></svg>
          Kon
        </button>
        <button class="tool-btn" id="tool-pass" onclick="setTool('pass')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="12" x2="19" y2="12"/><polyline points="14,7 19,12 14,17"/></svg>
          Pass
        </button>
        <button class="tool-btn" id="tool-move" onclick="setTool('move')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="12" x2="17" y2="12" stroke-dasharray="5,3"/><polyline points="13,7 18,12 13,17"/></svg>
          Rörelse
        </button>
        <button class="tool-btn" id="tool-dribble" onclick="setTool('dribble')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3,12 Q5,8 7,12 Q9,16 11,12 Q13,8 15,12 Q17,16 19,12"/><polyline points="16,8 19,12 16,16"/></svg>
          Dribbling
        </button>
        <button class="tool-btn" id="tool-ball" onclick="setTool('ball')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="white" stroke="#555" stroke-width="1.5"/><path d="M12 4 L14 8 L12 11 L10 8 Z" fill="#333"/><circle cx="12" cy="12" r="2" fill="#333"/></svg>
          Boll
        </button>
        <button class="tool-btn" id="tool-select" onclick="setTool('select')">
          <svg viewBox="0 0 24 24"><path d="M5 3 L5 19 L9 15 L12 21 L14 20 L11 14 L16 14 Z" fill="currentColor"/></svg>
          Flytta
        </button>
        <button class="tool-btn" id="tool-erase" onclick="setTool('erase')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17 L8 22 L21 9 L16 4 Z" fill="rgba(255,100,100,0.3)"/><line x1="3" y1="22" x2="21" y2="22"/></svg>
          Radera
        </button>
      </div>
    </div>
    <div class="toolbox-section">
      <div class="toolbox-title">Spelare</div>
      <div class="player-count"><label>Team A (lila):</label><input type="number" id="teamA-count" value="6" min="1" max="11"></div>
      <div class="player-count"><label>Team B (vit):</label><input type="number" id="teamB-count" value="6" min="0" max="11"></div>
      <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:4px;">Klicka = Team A<br>Håll Shift = Team B</div>
    </div>
    <div class="toolbox-section">
      <div class="toolbox-title">Linjefärg</div>
      <div class="color-row">
        <div class="color-swatch active" style="background:#ffffff" onclick="setLineColor('#ffffff')" data-color="#ffffff"></div>
        <div class="color-swatch" style="background:#f5c842" onclick="setLineColor('#f5c842')" data-color="#f5c842"></div>
        <div class="color-swatch" style="background:#e8540a" onclick="setLineColor('#e8540a')" data-color="#e8540a"></div>
        <div class="color-swatch" style="background:#3498db" onclick="setLineColor('#3498db')" data-color="#3498db"></div>
        <div class="color-swatch" style="background:#2ecc71" onclick="setLineColor('#2ecc71')" data-color="#2ecc71"></div>
      </div>
    </div>
    <div class="toolbox-section">
      <div class="toolbox-title">Symboler</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.35);line-height:1.9;">
        <span style="color:rgba(255,255,255,0.6)">——&#8594;</span> pass<br>
        <span style="color:rgba(255,255,255,0.6)">- -&#8594;</span> rörelse<br>
        <span style="color:rgba(255,255,255,0.6)">&#12316;&#12316;&#8594;</span> dribbling<br>
        <span style="color:#ff6b1a">&#9650;</span> kon &nbsp;<span style="color:rgba(255,255,255,0.6)">&#9917;</span> boll
      </div>
    </div>
  </div>

  <div class="canvas-area" id="canvas-area">
    <canvas id="pitch-canvas"></canvas>
    <div class="hint-bar" id="hint-bar">Välj verktyg och tryck på planen</div>
    <div class="legend">
      <div class="legend-item">
        <svg width="26" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="white" stroke-width="2"/><polygon points="15,1 20,4 15,7" fill="white"/></svg>Pass
      </div>
      <div class="legend-item">
        <svg width="26" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="white" stroke-width="2" stroke-dasharray="5,3"/><polygon points="15,1 20,4 15,7" fill="white"/></svg>Rörelse
      </div>
      <div class="legend-item">
        <svg width="30" height="10"><path d="M0,5 Q4,1 8,5 Q12,9 16,5 Q20,1 24,5" stroke="white" stroke-width="2" fill="none"/><polygon points="21,2 25,5 21,8" fill="white"/></svg>Dribbling
      </div>
    </div>
  </div>

  <div class="steps-panel">
    <div class="steps-header">
      <h2>&#128203; Moment</h2>
      <button class="btn btn-ghost" style="font-size:10px;padding:3px 7px;" onclick="snapStep()">+ Nu</button>
    </div>
    <div class="steps-list" id="steps-list">
      <div class="step-empty">Rita övningen och lägg till moment</div>
    </div>
    <div class="add-step-area">
      <input type="text" id="step-title" placeholder="Momentets namn..." />
      <textarea id="step-comment" placeholder="Instruktion / kommentar..."></textarea>
      <button class="btn btn-primary" onclick="addStep()">+ Lägg till moment</button>
    </div>
  </div>
</div>

<script>
var canvas = document.getElementById('pitch-canvas');
var ctx = canvas.getContext('2d');
var S = {
  pitch:'full', tool:'player', lineColor:'#ffffff',
  elements:[], steps:[], lineStart:null,
  dragging:null, dragOffX:0, dragOffY:0,
  history:[], activeStep:null, mouse:null
};

function resize() {
  var area = document.getElementById('canvas-area');
  var r = area.getBoundingClientRect();
  canvas.width = Math.floor(r.width - 24);
  canvas.height = Math.floor(r.height - 24);
  drawAll();
}
window.addEventListener('resize', resize);
window.addEventListener('load', function(){ setTimeout(resize, 100); });

function getDims() {
  var W = canvas.width, H = canvas.height, PAD = 28;
  var cfgs = {
    full:  {realW:68, realH:105},
    half:  {realW:68, realH:52.5},
    third: {realW:68, realH:35},
    box:   {realW:40.32, realH:16.5},
    free:  {realW:68, realH:105}
  };
  var cfg = cfgs[S.pitch] || cfgs.full;
  var aspect = cfg.realW / cfg.realH;
  var pw = W - PAD*2, ph = H - PAD*2;
  if (pw/ph > aspect) pw = ph*aspect; else ph = pw/aspect;
  return { ox:(W-pw)/2, oy:(H-ph)/2, pw:pw, ph:ph, realW:cfg.realW, realH:cfg.realH };
}

function m2p(mx,my,d){ return {x: d.ox+(mx/d.realW)*d.pw, y: d.oy+(my/d.realH)*d.ph}; }
function p2m(px,py,d){ return {x:((px-d.ox)/d.pw)*d.realW, y:((py-d.oy)/d.ph)*d.realH}; }
function inPitch(mx,my,d){ return mx>=0&&my>=0&&mx<=d.realW&&my<=d.realH; }

function drawPitch(d) {
  var ox=d.ox, oy=d.oy, pw=d.pw, ph=d.ph, RW=d.realW, RH=d.realH;
  // Background
  ctx.fillStyle='#1a5c28';
  ctx.fillRect(ox,oy,pw,ph);
  // Stripes
  var ns=10, sh=ph/ns;
  for(var i=0;i<ns;i++){
    ctx.fillStyle=i%2===0?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.03)';
    ctx.fillRect(ox,oy+i*sh,pw,sh);
  }
  // Lines
  ctx.strokeStyle='rgba(255,255,255,0.88)';
  ctx.lineWidth=Math.max(1,pw/220);
  ctx.lineCap='round'; ctx.setLineDash([]);

  function ln(x1,y1,x2,y2){
    var a=m2p(x1,y1,d),b=m2p(x2,y2,d);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  function rc(x,y,w,h){
    var a=m2p(x,y,d);
    ctx.strokeRect(a.x,a.y,(w/RW)*pw,(h/RH)*ph);
  }
  function cir(cx,cy,rm,sa,ea){
    var c=m2p(cx,cy,d), r=(rm/RW)*pw;
    ctx.beginPath();ctx.arc(c.x,c.y,r,sa!=null?sa:0,ea!=null?ea:Math.PI*2);ctx.stroke();
  }
  function dot(cx,cy){
    var c=m2p(cx,cy,d);
    ctx.fillStyle='white';ctx.beginPath();ctx.arc(c.x,c.y,3,0,Math.PI*2);ctx.fill();
  }

  if(S.pitch!=='free') ctx.strokeRect(ox,oy,pw,ph);

  if(S.pitch==='full'){
    ln(0,RH/2,RW,RH/2);
    cir(RW/2,RH/2,9.15); dot(RW/2,RH/2);
    var palx=(RW-40.32)/2;
    rc(palx,0,40.32,16.5); rc((RW-18.32)/2,0,18.32,5.5); dot(RW/2,11);
    var ts=m2p(RW/2,11,d); ctx.beginPath();ctx.arc(ts.x,ts.y,(9.15/RW)*pw,0.18*Math.PI,0.82*Math.PI);ctx.stroke();
    rc(palx,RH-16.5,40.32,16.5); rc((RW-18.32)/2,RH-5.5,18.32,5.5); dot(RW/2,RH-11);
    var bs=m2p(RW/2,RH-11,d); ctx.beginPath();ctx.arc(bs.x,bs.y,(9.15/RW)*pw,1.18*Math.PI,1.82*Math.PI);ctx.stroke();
    var glx=(RW-7.32)/2;
    rc(glx,-2.44,7.32,2.44); rc(glx,RH,7.32,2.44);
    [[0,0,0,Math.PI/2],[RW,0,Math.PI/2,Math.PI],[0,RH,-Math.PI/2,0],[RW,RH,Math.PI,Math.PI*1.5]].forEach(function(c){
      var cp=m2p(c[0],c[1],d),cr=(1/RW)*pw;
      ctx.beginPath();ctx.arc(cp.x,cp.y,cr,c[2],c[3]);ctx.stroke();
    });
  } else if(S.pitch==='half'){
    var palx=(RW-40.32)/2;
    rc(palx,RH-16.5,40.32,16.5); rc((RW-18.32)/2,RH-5.5,18.32,5.5); dot(RW/2,RH-11);
    var sp=m2p(RW/2,RH-11,d); ctx.beginPath();ctx.arc(sp.x,sp.y,(9.15/RW)*pw,1.18*Math.PI,1.82*Math.PI);ctx.stroke();
    cir(RW/2,0,9.15); dot(RW/2,0);
    rc((RW-7.32)/2,RH,7.32,2.44);
  } else if(S.pitch==='third'){
    var palx=(RW-40.32)/2;
    rc(palx,RH-16.5,40.32,16.5); rc((RW-18.32)/2,RH-5.5,18.32,5.5); dot(RW/2,RH-11);
    rc((RW-7.32)/2,RH,7.32,2.44);
  } else if(S.pitch==='box'){
    dot(RW/2,11); rc((RW-18.32)/2,0,18.32,5.5);
  }
  // free: plain green, no lines drawn
}

function drawJersey(px,py,num,color) {
  var s=17;
  ctx.save(); ctx.translate(px,py);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(0,s*0.95,s*0.65,s*0.2,0,0,Math.PI*2);ctx.fill();
  // Body
  ctx.fillStyle=color; ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1.1;
  ctx.beginPath();
  ctx.moveTo(-s*0.52,-s*0.08); ctx.lineTo(-s*0.42,s*0.72);
  ctx.lineTo(s*0.42,s*0.72); ctx.lineTo(s*0.52,-s*0.08);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Left sleeve
  ctx.beginPath();
  ctx.moveTo(-s*0.52,-s*0.08); ctx.lineTo(-s*0.88,s*0.28);
  ctx.lineTo(-s*0.68,s*0.42); ctx.lineTo(-s*0.42,s*0.18);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Right sleeve
  ctx.beginPath();
  ctx.moveTo(s*0.52,-s*0.08); ctx.lineTo(s*0.88,s*0.28);
  ctx.lineTo(s*0.68,s*0.42); ctx.lineTo(s*0.42,s*0.18);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Collar
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath();ctx.ellipse(0,-s*0.1,s*0.2,s*0.12,0,0,Math.PI*2);ctx.fill();
  // Number
  ctx.fillStyle=color==='#e8e8e8'?'rgba(40,40,40,0.9)':'rgba(255,255,255,0.95)';
  ctx.font='bold '+Math.round(s*0.6)+'px Barlow Condensed, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(num),0,s*0.28);
  ctx.restore();
}

function drawCone(px,py,color) {
  var s=9; ctx.save(); ctx.translate(px,py);
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath();ctx.ellipse(0,s+1,s*0.6,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=color||'#ff6b1a'; ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s,s);ctx.lineTo(-s,s);ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.moveTo(-1,-s*0.1);ctx.lineTo(s*0.55,s);ctx.lineTo(s*0.25,s);ctx.lineTo(-s*0.28,-s*0.1);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawBall(px,py) {
  var r=7; ctx.save(); ctx.translate(px,py);
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath();ctx.ellipse(0,r+1,r*0.75,3,0,0,Math.PI*2);ctx.fill();
  var g=ctx.createRadialGradient(-2,-2,1,0,0,r);
  g.addColorStop(0,'#fff');g.addColorStop(1,'#ccc');
  ctx.fillStyle=g; ctx.strokeStyle='#555'; ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(0,0,2.5,0,Math.PI*2);ctx.fill();
  for(var i=0;i<5;i++){
    var a=(i/5)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.arc(Math.cos(a)*r*0.54,Math.sin(a)*r*0.54,1.4,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawArrow(el,d,alpha) {
  if(el.x2==null) return;
  var a=m2p(el.x,el.y,d), b=m2p(el.x2,el.y2,d);
  ctx.save(); ctx.globalAlpha=alpha!=null?alpha:1;
  ctx.strokeStyle=el.color||'#fff'; ctx.lineWidth=2.2;
  ctx.lineCap='round'; ctx.lineJoin='round';
  if(el.type==='pass'){
    ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  } else if(el.type==='move'){
    ctx.setLineDash([7,4]);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    ctx.setLineDash([]);
  } else if(el.type==='dribble'){
    ctx.setLineDash([]);
    var dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy);
    if(len>1){
      var nx=-dy/len,ny=dx/len,amp=5,freq=len/18;
      ctx.beginPath();ctx.moveTo(a.x,a.y);
      var steps=Math.ceil(len/2);
      for(var i=1;i<=steps;i++){
        var t=i/steps,wave=Math.sin(t*freq*Math.PI*2)*amp;
        ctx.lineTo(a.x+dx*t+nx*wave,a.y+dy*t+ny*wave);
      }
      ctx.stroke();
    }
  }
  ctx.setLineDash([]);
  var ang=Math.atan2(b.y-a.y,b.x-a.x),al=10,asp=0.38;
  ctx.fillStyle=el.color||'#fff';
  ctx.beginPath();
  ctx.moveTo(b.x,b.y);
  ctx.lineTo(b.x-al*Math.cos(ang-asp),b.y-al*Math.sin(ang-asp));
  ctx.lineTo(b.x-al*Math.cos(ang+asp),b.y-al*Math.sin(ang+asp));
  ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawAll() {
  if(!canvas.width||!canvas.height) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var d=getDims();
  drawPitch(d);
  S.elements.forEach(function(el){
    var p=m2p(el.x,el.y,d);
    if(el.type==='player') drawJersey(p.x,p.y,el.num,el.team==='A'?'#550080':'#e8e8e8');
    else if(el.type==='cone') drawCone(p.x,p.y,el.color);
    else if(el.type==='ball') drawBall(p.x,p.y);
    else drawArrow(el,d);
  });
  if(S.lineStart&&S.mouse&&(S.tool==='pass'||S.tool==='move'||S.tool==='dribble')){
    var fe={type:S.tool,x:S.lineStart.x,y:S.lineStart.y,x2:S.mouse.x,y2:S.mouse.y,color:S.lineColor};
    drawArrow(fe,d,0.45);
    var sp=m2p(S.lineStart.x,S.lineStart.y,d);
    ctx.fillStyle=S.lineColor;ctx.beginPath();ctx.arc(sp.x,sp.y,4,0,Math.PI*2);ctx.fill();
  }
}

function evPos(e) {
  var r=canvas.getBoundingClientRect();
  var src=e.touches?e.touches[0]:e;
  var px=src.clientX-r.left, py=src.clientY-r.top;
  var d=getDims(), m=p2m(px,py,d);
  return {px:px,py:py,mx:m.x,my:m.y,d:d};
}

function onDown(e) {
  e.preventDefault();
  var pos=evPos(e);
  var px=pos.px,py=pos.py,mx=pos.mx,my=pos.my,d=pos.d;
  var isShift=e.shiftKey;
  if(S.tool==='select'){
    var el=findEl(px,py,d);
    if(el){var ep=m2p(el.x,el.y,d);S.dragging=el;S.dragOffX=px-ep.x;S.dragOffY=py-ep.y;}
    return;
  }
  if(S.tool==='erase'){
    var el2=findEl(px,py,d);
    if(el2){push();S.elements=S.elements.filter(function(e){return e!==el2;});drawAll();}
    return;
  }
  if(!inPitch(mx,my,d)) return;
  if(S.tool==='player'){
    push();
    var nA=S.elements.filter(function(e){return e.type==='player'&&e.team==='A';}).length;
    var nB=S.elements.filter(function(e){return e.type==='player'&&e.team==='B';}).length;
    var maxA=parseInt(document.getElementById('teamA-count').value)||11;
    var maxB=parseInt(document.getElementById('teamB-count').value)||0;
    var team=(isShift||nA>=maxA)&&nB<maxB?'B':'A';
    var num=team==='A'?nA+1:nB+1;
    S.elements.push({type:'player',x:mx,y:my,team:team,num:num});
    drawAll();return;
  }
  if(S.tool==='cone'){
    push();
    var c=S.lineColor==='#ffffff'?'#ff6b1a':S.lineColor;
    S.elements.push({type:'cone',x:mx,y:my,color:c});
    drawAll();return;
  }
  if(S.tool==='ball'){
    push();S.elements.push({type:'ball',x:mx,y:my});drawAll();return;
  }
  if(S.tool==='pass'||S.tool==='move'||S.tool==='dribble'){
    if(!S.lineStart){S.lineStart={x:mx,y:my};}
    else{
      push();
      S.elements.push({type:S.tool,x:S.lineStart.x,y:S.lineStart.y,x2:mx,y2:my,color:S.lineColor});
      S.lineStart=null;drawAll();
    }
  }
}

function onMove(e) {
  e.preventDefault();
  var pos=evPos(e);
  S.mouse={x:pos.mx,y:pos.my};
  var hints={player:'Klicka=Team A · Shift=Team B',cone:'Klicka för kon',pass:'Klicka startpunkt sedan slutpunkt',move:'Klicka startpunkt sedan slutpunkt',dribble:'Klicka startpunkt sedan slutpunkt',ball:'Klicka för boll',select:'Dra för att flytta',erase:'Klicka för att radera'};
  document.getElementById('hint-bar').textContent=S.lineStart?'Klicka för slutpunkt — Esc avbryter':(hints[S.tool]||'');
  if(S.dragging){
    var d2=getDims();
    var m=p2m(pos.px-S.dragOffX,pos.py-S.dragOffY,d2);
    S.dragging.x=m.x;S.dragging.y=m.y;drawAll();return;
  }
  if(S.lineStart) drawAll();
}

function onUp(e){S.dragging=null;}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp);

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){S.lineStart=null;drawAll();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z') undoLast();
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  var map={p:'player',k:'cone',a:'pass',r:'move',d:'dribble',b:'ball',s:'select',e:'erase'};
  if(map[e.key]) setTool(map[e.key]);
});

function findEl(px,py,d){
  for(var i=S.elements.length-1;i>=0;i--){
    var el=S.elements[i];
    if(el.type==='pass'||el.type==='move'||el.type==='dribble'){
      if(el.x2==null) continue;
      var a=m2p(el.x,el.y,d),b=m2p(el.x2,el.y2,d);
      if(dist(px,py,(a.x+b.x)/2,(a.y+b.y)/2)<18) return el;
    } else {
      var p=m2p(el.x,el.y,d);
      if(dist(px,py,p.x,p.y)<20) return el;
    }
  }
  return null;
}
function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1));}

function setTool(t){
  S.tool=t;S.lineStart=null;
  document.querySelectorAll('.tool-btn').forEach(function(b){b.classList.remove('active');});
  var btn=document.getElementById('tool-'+t);if(btn) btn.classList.add('active');
  canvas.style.cursor=t==='select'?'grab':t==='erase'?'cell':'crosshair';
  drawAll();
}
function setPitch(p){
  S.pitch=p;
  document.querySelectorAll('.pitch-option').forEach(function(b){b.classList.remove('active');});
  document.querySelector('[data-pitch="'+p+'"]').classList.add('active');
  drawAll();
}
function setLineColor(c){
  S.lineColor=c;
  document.querySelectorAll('.color-swatch').forEach(function(s){s.classList.remove('active');});
  document.querySelector('[data-color="'+c+'"]').classList.add('active');
}
function push(){
  S.history.push(JSON.stringify(S.elements));
  if(S.history.length>60) S.history.shift();
}
function undoLast(){
  if(!S.history.length) return;
  S.elements=JSON.parse(S.history.pop());drawAll();
}
function clearCanvas(){
  if(!confirm('Rensa hela planen?')) return;
  push();S.elements=[];S.lineStart=null;drawAll();
}

function addStep(){
  var title=document.getElementById('step-title').value.trim();
  var comment=document.getElementById('step-comment').value.trim();
  if(!title){alert('Ange ett namn!');return;}
  S.steps.push({id:Date.now(),num:S.steps.length+1,title:title,comment:comment,snapshot:JSON.stringify(S.elements)});
  document.getElementById('step-title').value='';
  document.getElementById('step-comment').value='';
  renderSteps();
}
function snapStep(){
  document.getElementById('step-title').value='Moment '+(S.steps.length+1);
  document.getElementById('step-title').focus();
}
function deleteStep(id){
  S.steps=S.steps.filter(function(s){return s.id!==id;});
  S.steps.forEach(function(s,i){s.num=i+1;});
  renderSteps();
}
function loadStep(id){
  var s=S.steps.find(function(s){return s.id===id;});if(!s) return;
  S.activeStep=id;S.elements=JSON.parse(s.snapshot);renderSteps();drawAll();
}
function renderSteps(){
  var list=document.getElementById('steps-list');
  if(!S.steps.length){list.innerHTML='<div class="step-empty">Rita övningen och lägg till moment</div>';return;}
  list.innerHTML=S.steps.map(function(s){
    return '<div class="step-card '+(S.activeStep===s.id?'active':'')+'" onclick="loadStep('+s.id+')">'
      +'<button class="step-delete" onclick="event.stopPropagation();deleteStep('+s.id+')">&#x2715;</button>'
      +'<div class="step-card-title"><span class="step-num">'+s.num+'</span>'+s.title+'</div>'
      +(s.comment?'<div class="step-card-comment">'+s.comment+'</div>':'')
      +'</div>';
  }).join('');
}

function exportPNG(){
  var stepLines=S.steps.map(function(s){return s.num+'. '+s.title+(s.comment?' - '+s.comment:'');});
  if(!stepLines.length){
    var a=document.createElement('a');a.download='traningsplan.png';a.href=canvas.toDataURL('image/png');a.click();return;
  }
  var lineH=18,pad=14,textH=stepLines.length*lineH+pad*2+10;
  var fc=document.createElement('canvas');
  fc.width=canvas.width;fc.height=canvas.height+textH;
  var fctx=fc.getContext('2d');
  fctx.drawImage(canvas,0,0);
  fctx.fillStyle='#0f1a12';
  fctx.fillRect(0,canvas.height,fc.width,textH);
  fctx.strokeStyle='rgba(245,200,66,0.5)';fctx.lineWidth=1;
  fctx.beginPath();fctx.moveTo(pad,canvas.height+8);fctx.lineTo(fc.width-pad,canvas.height+8);fctx.stroke();
  fctx.fillStyle='rgba(255,255,255,0.82)';
  fctx.font='13px Barlow, Arial, sans-serif';
  stepLines.forEach(function(line,i){
    fctx.fillText(line,pad,canvas.height+pad+10+(i*lineH));
  });
  var a=document.createElement('a');a.download='traningsplan.png';a.href=fc.toDataURL('image/png');a.click();
}

function exportPDF(){
  if(!window.jspdf){alert('PDF-biblioteket laddas fortfarande. Vänta en sekund och försök igen.');return;}
  try{
    var jsPDF=window.jspdf.jsPDF;
    var imgData=canvas.toDataURL('image/png');
    var pdfW=297,pdfH=210;
    var doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    var asp=canvas.width/canvas.height;
    var imgW=pdfW*0.60,imgH=imgW/asp;
    if(imgH>pdfH-20){imgH=pdfH-20;imgW=imgH*asp;}
    doc.addImage(imgData,'PNG',10,10,imgW,imgH);
    var colX=10+imgW+8,colW=pdfW-colX-8,y=16;
    doc.setFont('helvetica','bold');doc.setFontSize(12);
    doc.setTextColor(245,200,66);doc.text('Träningsplan',colX,y);y+=7;
    doc.setDrawColor(245,200,66);doc.setLineWidth(0.3);
    doc.line(colX,y,colX+colW,y);y+=5;
    if(S.steps.length){
      S.steps.forEach(function(s){
        if(y>pdfH-10) return;
        doc.setFillColor(25,70,40);doc.rect(colX,y-3.5,colW,6,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
        doc.text(s.num+'.  '+s.title,colX+2,y);y+=6;
        if(s.comment&&y<pdfH-8){
          doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(190,215,190);
          var lines=doc.splitTextToSize(s.comment,colW-5);
          lines.forEach(function(line){if(y<pdfH-8){doc.text(line,colX+4,y);y+=4.5;}});
          y+=2;
        }
      });
    } else {
      doc.setFont('helvetica','italic');doc.setFontSize(9);doc.setTextColor(140,140,140);
      doc.text('Inga moment tillagda',colX,y);
    }
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(100,120,100);
    doc.text('Träningsplaneraren  ·  '+new Date().toLocaleDateString('sv-SE'),10,pdfH-4);
    doc.save('traningsplan.pdf');
  } catch(err){
    alert('PDF-export misslyckades: '+err.message+'\nAnvänd PNG istället.');
    console.error(err);
  }
}

resize();
</script>
